<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Weather - Đăng nhập</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="./css/auth.css">
</head>
<body>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Loading Overlay -->
    <div class="loading-overlay hidden" id="loading-overlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner"></i>
            <p id="loading-text">Đang xử lý...</p>
        </div>
    </div>

    <div class="login-card-custom text-center">
        <div class="mb-4">
            <i class="fas fa-cloud cloud-icon"></i>
            <h3 class="title-text">AI Weather</h3>
        </div>

        <form id="login-form">
            <div class="input-wrapper">
                <i class="far fa-envelope"></i>
                <input type="email" id="email" class="input-custom" placeholder="Email" required>
            </div>
            
            <div class="input-wrapper has-toggle-icon">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" class="input-custom" placeholder="Password" required>
                <i class="fas fa-eye password-toggle-icon" onclick="togglePassword('password', this)"></i>
            </div>

            <button type="submit" class="btn-gradient" id="btn-submit">
                Login
            </button>

            <div class="bottom-text">
                <a href="forgot-password.html" class="d-block mb-2" style="color: rgba(255, 255, 255, 0.6); font-weight: normal;">Forgot Password?</a>
                <span>No account? </span>
                <a href="register.html">Register now</a>
            </div>
        </form>
    </div>

    <script src="./js/auth.js"></script>
    <script src="./js/login.js"></script>

    <!-- Glassmorphism Modal for Locked Account -->
    <div id="locked-modal" style="display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 9999; align-items: center; justify-content: center;">
        <div style="background: rgba(255, 255, 255, 0.15); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.3); text-align: center; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37); max-width: 400px; width: 90%;">
            <i class="fas fa-user-lock" style="font-size: 50px; color: #ff4d4f; margin-bottom: 20px;"></i>
            <h2 style="color: white; margin-bottom: 15px; font-weight: 600;">Tài khoản bị khóa</h2>
            <p style="color: rgba(255,255,255,0.9); margin-bottom: 25px; line-height: 1.6;">Tài khoản của bạn đã bị khóa do vi phạm chính sách hoặc lý do bảo mật. Hãy liên hệ <b>ADMIN</b> để biết thêm thông tin.</p>
            <button onclick="document.getElementById('locked-modal').style.display='none'" style="background: #4facfe; color: white; border: none; padding: 12px 30px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%;">Đã hiểu</button>
        </div>
    </div>
</body>
</html>
