<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Weather - Đăng nhập</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="./css/auth.css">
</head>
<body>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Loading Overlay -->
    <div class="loading-overlay hidden" id="loading-overlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner"></i>
            <p id="loading-text">Đang xử lý...</p>
        </div>
    </div>

    <div class="login-card-custom text-center">
        <div class="mb-4">
            <i class="fas fa-cloud cloud-icon"></i>
            <h3 class="title-text">AI Weather</h3>
        </div>

        <form id="login-form">
            <div class="input-wrapper">
                <i class="far fa-envelope"></i>
                <input type="email" id="email" class="input-custom" placeholder="Email" required>
            </div>
            
            <div class="input-wrapper has-toggle-icon">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" class="input-custom" placeholder="Password" required>
                <i class="fas fa-eye password-toggle-icon" onclick="togglePassword('password', this)"></i>
            </div>

            <button type="submit" class="btn-gradient" id="btn-submit">
                Login
            </button>

            <div class="bottom-text">
                <a href="forgot-password.html" class="d-block mb-2" style="color: rgba(255, 255, 255, 0.6); font-weight: normal;">Forgot Password?</a>
                <span>No account? </span>
                <a href="register.html">Register now</a>
            </div>
        </form>
    </div>

    <script src="./js/auth.js"></script>
    <script src="./js/login.js"></script>
</body>
</html>
