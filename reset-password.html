<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Weather - Đặt lại mật khẩu</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="./css/auth.css">
</head>
<body>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Loading Overlay -->
    <div class="loading-overlay hidden" id="loading-overlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner"></i>
            <p id="loading-text">Đang xử lý...</p>
        </div>
    </div>

    <div class="login-card-custom text-center">
        <div class="mb-4">
            <i class="fas fa-cloud cloud-icon"></i>
            <h3 class="title-text">AI Weather</h3>
            <p class="subtitle-text">Nhập mật khẩu mới của bạn</p>
        </div>

        <form id="reset-password-form">
            <div class="input-wrapper has-toggle-icon">
                <i class="fas fa-lock lock-icon"></i>
                <input type="password" id="new-password" class="input-custom" placeholder="Mật khẩu mới" required>
                <i class="fas fa-eye password-toggle-icon" onclick="togglePassword('new-password', this)"></i>
            </div>

            <div class="input-wrapper has-toggle-icon">
                <i class="fas fa-lock lock-icon"></i>
                <input type="password" id="confirm-password" class="input-custom" placeholder="Nhập lại mật khẩu" required>
                <i class="fas fa-eye password-toggle-icon" onclick="togglePassword('confirm-password', this)"></i>
            </div>

            <button type="submit" class="btn-gradient" id="btn-submit">
                Đặt lại mật khẩu
            </button>

            <div class="bottom-text">
                <a href="login.html">← Quay lại đăng nhập</a>
            </div>
        </form>
    </div>

    <script src="./js/auth.js"></script>
    <script src="./js/reset-password.js"></script>
</body>
</html>
