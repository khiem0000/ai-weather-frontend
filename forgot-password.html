<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Weather - Quên mật khẩu</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="./css/auth.css">
</head>
<body>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Loading Overlay -->
    <div class="loading-overlay hidden" id="loading-overlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner"></i>
            <p id="loading-text">Đang xử lý...</p>
        </div>
    </div>

    <div class="login-card-custom text-center">
        <div class="mb-4">
            <i class="fas fa-cloud cloud-icon"></i>
            <h3 class="title-text">AI Weather</h3>
            <p class="subtitle-text">Nhập email và bấm gửi mã OTP để xác thực</p>
        </div>

        <form id="forgot-password-form">
            <div class="input-wrapper">
                <i class="far fa-envelope"></i>
                <div class="input-with-btn">
                    <input type="email" id="email" class="input-custom" placeholder="Email" required>
                    <button type="button" class="btn-otp" id="btn-send-otp">
                        Gửi mã OTP
                    </button>
                </div>
            </div>

            <div class="otp-timer" id="otp-timer" style="display: none;">
                Gửi lại mã sau: <span id="countdown">60</span> giây
            </div>

            <div class="input-wrapper" style="margin-top: 20px;">
                <i class="fas fa-shield-alt"></i>
                <input type="text" id="otp" class="input-custom" placeholder="Nhập mã OTP" required>
            </div>

            <button type="submit" class="btn-gradient" id="btn-submit" style="display: none;">
                Xác thực & Đặt lại mật khẩu
            </button>

            <div class="bottom-text">
                <a href="login.html">← Quay lại đăng nhập</a>
            </div>
        </form>
    </div>

    <script src="./js/auth.js"></script>
    <script src="./js/forgot-password.js"></script>
</body>
</html>
